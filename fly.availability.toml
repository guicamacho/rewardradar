# availability-service — the brand-neutral backend.
#
# Private by design: no public IP and no [http_service], so it is never
# exposed to the internet. Brand apps and the data-core worker reach it
# over Fly private networking at rewardradar-availability.internal:8080.
#
# Deploy from the repo root: fly deploy -c fly.availability.toml
app = "rewardradar-availability"
primary_region = "syd"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8080"
  UPSTREAM = "csv"
  CACHE_TTL_MS = "300000"

# Secrets (set with `fly secrets set -a rewardradar-availability`):
#   AVAILABILITY_SERVICE_KEY   required; the x-availability-key shared secret
#   AERO_API_KEY               only when UPSTREAM=aero (live provider)

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory = "256mb"

# Single always-on machine keeps the in-memory route+window cache warm,
# which is the whole point of one backend serving many brands.
[checks.health]
  type = "http"
  port = 8080
  method = "GET"
  path = "/health"
  interval = "15s"
  timeout = "2s"
  grace_period = "10s"
